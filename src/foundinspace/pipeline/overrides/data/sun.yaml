description: >
  Add the Sun as a manual object at the ICRS origin. For deterministic 2D
  sharding, this uses fixed RA/Dec = (0.0, 0.0) when r_pc = 0.0.
  Astrometric fields here are synthetic/manual catalogue conventions, not
  observational measurements. Physical constants use Johnson V absolute
  magnitude and the IAU 2015 nominal solar effective temperature.

stars:
  - override_id: manual.sun.add.v1
    action: add
    source: manual
    source_id: sun
    override_reason: missing_star
    override_policy_version: v1

    # Deterministic angular fallback for an origin object.
    ra_deg: 0.0
    dec_deg: 0.0
    r_pc: 0.0

    x_icrs_pc: 0.0
    y_icrs_pc: 0.0
    z_icrs_pc: 0.0

    mag_abs: 4.83
    mag_band: Johnson_V
    teff: 5772

    identifiers:
      proper_name: Sol

    notes: >
      The astrometric coordinates (ra_deg/dec_deg/r_pc and x/y/z) are manual
      deterministic catalogue conventions for a synthetic origin object used by
      this pipeline, not observationally measured solar astrometry. teff uses
      the IAU 2015 nominal solar effective temperature from Prsa et al. (2016,
      Resolution B3): T_eff,Sun = 5772 K. mag_abs is set to the traditional
      Johnson V solar absolute magnitude 4.83; this is intentionally a
      convention choice. Literature also reports modern synthetic estimates near
      M_V,Sun ~ 4.81 (e.g. Torres 2010; Willmer 2018), but we retain 4.83 for
      continuity with common historical catalogue usage.