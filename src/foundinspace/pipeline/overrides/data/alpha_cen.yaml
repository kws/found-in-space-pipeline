description: >
  Manual overrides for the Alpha Centauri system. Distances for Alpha Cen A/B
  are pinned to a system-level binary solution rather than per-component Gaia/
  Hipparcos entries. Photometric values preserve source-specific quality flags.
  HIP numbers: A = 71683, B = 71681, Proxima = 70890.

  Proxima Centauri (HIP 70890) is missing from the Gaia DR3
  hipparcos2_best_neighbour crossmatch table — likely due to its extreme
  proper motion (~3.8 arcsec/yr). Without a crossmatch link the merger
  cannot deduplicate, so the Gaia duplicate is explicitly dropped here.

stars:
  - override_id: manual.alpha_cen_a.replace.v1
    action: replace
    source: hip
    source_id: 71683
    override_reason: binary_astrometry_photometry
    override_policy_version: kervella2016_v1

    ra_deg: 219.9020583333
    dec_deg: -60.8339926944
    r_pc: 1.3383835004

    mag_abs: 4.3771
    teff: 5792

    photometry_band: "Johnson V"
    photometry_quality: "C"
    photometry_value: 0.01
    identifiers:
      proper_name: Rigil Kentaurus
      hip_id: 71683
      hd: 128620
      bayer: alpha Cen
      constellation: Cen

    notes: >
      Position follows SIMBAD coordinates associated with the Hipparcos frame
      (van Leeuwen 2007 context). Distance uses the Alpha Cen system parallax
      solution from Kervella et al. (2016/2017) and is applied to both A and B
      to keep a single binary-consistent distance. Photometric value is SIMBAD
      Johnson V (Ducati 2002 compilation), carrying the catalogue quality flag C.

  - override_id: manual.alpha_cen_b.replace.v1
    action: replace
    source: hip
    source_id: 71681
    override_reason: binary_astrometry_photometry
    override_policy_version: kervella2016_v1

    ra_deg: 219.8960962917
    dec_deg: -60.8375275556
    r_pc: 1.3383835004

    mag_abs: 5.6971
    teff: 5231

    photometry_band: "Johnson V"
    photometry_quality: "C"
    photometry_value: 1.33
    identifiers:
      proper_name: Toliman
      hip_id: 71681
      hd: 128621
      bayer: alpha Cen
      constellation: Cen

    notes: >
      Position follows SIMBAD coordinates associated with the Hipparcos frame
      (van Leeuwen 2007 context). Distance uses the same Kervella et al.
      (2016/2017) system-level Alpha Cen parallax used for component A so both
      components remain internally consistent. Photometric value is SIMBAD
      Johnson V (Ducati 2002 compilation), carrying the catalogue quality flag C.

  - override_id: manual.proxima_cen.replace.v1
    action: replace
    source: hip
    source_id: 70890
    override_reason: variable_star_manual_quality_annotation
    override_policy_version: gaia_dr3_v1

    ra_deg: 217.4289422216
    dec_deg: -62.6794901891
    r_pc: 1.3019705976

    mag_abs: 15.5570
    teff: 2980

    photometry_band: "Johnson V"
    photometry_quality: "D"
    photometry_value: 11.13
    identifiers:
      proper_name: Proxima Centauri

    photometry_note: "Variable flare star; fixed V is a representative catalogue value, not a constant brightness."
    notes: >
      Position and distance are anchored to Gaia DR3 astrometry as carried via
      SIMBAD. Photometry uses SIMBAD Johnson V linked to Jao et al. (2014).
      Because Proxima is a flare star, the fixed V value is a representative
      catalogue brightness for pipeline use rather than a physically constant
      magnitude at all epochs.
