description: >
  Manual overrides for the Alpha Centauri system. Distances for Alpha Cen A/B
  are pinned to a system-level binary solution rather than per-component Gaia/
  Hipparcos entries. Photometric values preserve source-specific quality flags.
  HIP numbers: A = 71683, B = 71681, Proxima = 70890.

stars:
  - override_id: manual.alpha_cen_a.replace.v1
    action: replace
    source: hip
    source_id: 71683
    override_reason: binary_astrometry_photometry
    override_policy_version: kervella2016_v1

    ra_deg: 219.9020583333
    dec_deg: -60.8339926944
    r_pc: 1.3383835004

    mag_abs: 4.3771
    teff: 5792

    position_ref: "SIMBAD coord, van Leeuwen 2007"
    distance_ref: "Kervella et al. 2016/2017 system parallax"
    photometry_ref: "SIMBAD V photometry, Ducati 2002"
    photometry_band: "Johnson V"
    photometry_quality: "C"
    photometry_value: 0.01

  - override_id: manual.alpha_cen_b.replace.v1
    action: replace
    source: hip
    source_id: 71681
    override_reason: binary_astrometry_photometry
